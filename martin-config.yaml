# Martin Tile Server Configuration for OpenHelm
# Optimized for Raspberry Pi 5 marine navigation

listen_addresses: "0.0.0.0:3001"

# Performance optimizations for Raspberry Pi 5 (4 cores, 8GB RAM)
worker_processes: 4
max_feature_count: 10000

# MBTiles sources for offline maps (will auto-discover .mbtiles files)
mbtiles:
  paths:
    - "./tiles"
    - "./tiles/cusp"
    - "./tiles/enc"
    - "./tiles/s57"
  # sources:
    # GSHHS coastline - removed, file no longer exists
    # gshhs_base:
    #   path: "./tiles/cusp/gshhs_base.mbtiles"

# PMTiles for modern vector tiles (will auto-discover .pmtiles files)
pmtiles:
  paths:
    - "./tiles"

# Cache configuration (increased for Pi 5's 8GB RAM)
cache_size_mb: 512